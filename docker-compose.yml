services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: homepot-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-homepot_db}
      POSTGRES_USER: ${POSTGRES_USER:-homepot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-homepot_dev_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homepot_user -d homepot_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - homepot-network

  homepot-client:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homepot-client
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE__URL: postgresql://homepot_user:homepot_dev_password@postgres:5432/homepot_db
      PYTHONPATH: /app
    command: >
      sh -c "
      uvicorn homepot.main:app --host 0.0.0.0 --port 8000
      "
    restart: unless-stopped
    networks:
      - homepot-network

networks:
  homepot-network:
    driver: bridge

volumes:
  postgres-data:
