name: CI/CD Pipeline

on:
  push:
    branches: [main, "w[0-9]-**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default permissions for all jobs
permissions:
  contents: read

env:
  SECRET_KEY: ci_test_secret_key
  # Ephemeral, throwaway credentials for the CI-only PostgreSQL instance.
  # The database is destroyed with the runner, so this is not a real secret.
  PG_TEST_USER: homepot_user
  PG_TEST_PASSWORD: ci_test_password
  PG_TEST_DB: homepot_test

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    if: github.repository == 'brunel-opensim/homepot-client'
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        set -e
        python -m pip install --upgrade pip
        pip install -e "backend[dev,test,agent]"
        pip install types-PyYAML types-passlib types-psutil 2>/dev/null || true

    - name: Run Black formatter check
      run: black --check backend/src/homepot/ backend/tests/ ai/ uq/

    - name: Run isort import sorting check
      run: isort --check-only backend/src/homepot/ backend/tests/ ai/ uq/

    - name: Run flake8 linting
      run: flake8 backend/src/homepot/ backend/tests/ ai/ uq/

    - name: Run mypy type checking
      run: mypy --config-file=backend/mypy.ini backend/src/homepot/ ai/ uq/

    - name: Validate documentation files
      run: |
        # Check that essential documentation files exist
        test -f README.md || (echo "ERROR: README.md missing" && exit 1)
        test -f CONTRIBUTING.md || (echo "ERROR: CONTRIBUTING.md missing" && exit 1)
        test -f docs/index.md || (echo "ERROR: docs/index.md missing" && exit 1)
        test -f docs/getting-started.md || (echo "ERROR: docs/getting-started.md missing" && exit 1)
        echo "Documentation files validated"

  test:
    timeout-minutes: 30
    name: Test Suite
    runs-on: ${{ matrix.os }}
    if: github.repository == 'brunel-opensim/homepot-client'
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.11', '3.12']
        include:
          # Only test Python 3.11 on Windows/macOS to reduce CI time
          - os: windows-latest
            python-version: '3.11'
          - os: macos-latest
            python-version: '3.11'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      shell: bash
      run: |
        set -e
        python -m pip install --upgrade pip
        pip install -e "backend[dev,test,${{ matrix.os == 'windows-latest' && 'agent' || '' }}]"

    - name: Install PostgreSQL 16 + TimescaleDB (Ubuntu only)
      if: matrix.os == 'ubuntu-latest'
      run: |
        set -e
        sudo apt-get update
        sudo apt-get install -y postgresql-16 postgresql-client-16

        # Add the TimescaleDB apt repository and install the extension
        # package matching PostgreSQL 16 (same major version used in prod).
        curl -s https://packagecloud.io/install/repositories/timescale/timescaledb/script.deb.sh | sudo bash
        sudo apt-get install -y timescaledb-2-postgresql-16

        # Wire up shared_preload_libraries and other recommended settings,
        # then restart for the change to take effect.
        sudo timescaledb-tune --quiet --yes
        sudo systemctl restart postgresql
        pg_isready

        # Create the throwaway CI test role/database and enable the extension.
        sudo -u postgres psql -c "CREATE ROLE ${PG_TEST_USER} LOGIN PASSWORD '${PG_TEST_PASSWORD}';"
        sudo -u postgres psql -c "CREATE DATABASE ${PG_TEST_DB} OWNER ${PG_TEST_USER};"
        sudo -u postgres psql -d "${PG_TEST_DB}" -c "CREATE EXTENSION IF NOT EXISTS timescaledb;"

    - name: Run unit tests
      shell: bash
      env:
        # Ubuntu runs against real PostgreSQL + TimescaleDB (matching
        # production). Windows/macOS use file-based SQLite since installing
        # PostgreSQL without Docker isn't practical cross-platform there.
        DATABASE__URL: ${{ matrix.os == 'ubuntu-latest' && format('postgresql+asyncpg://{0}:{1}@localhost:5432/{2}', env.PG_TEST_USER, env.PG_TEST_PASSWORD, env.PG_TEST_DB) || 'sqlite+aiosqlite:///./test.db' }}
      run: |
        cd backend
        # Run sequentially to avoid SQLite locking issues (no -n auto)
        IGNORE="--ignore=tests/test_apns_apple.py --ignore=tests/test_web_push.py"
        
        if [[ "${{ matrix.os }}" == "ubuntu-latest" && "${{ matrix.python-version }}" == "3.11" ]]; then
          # Generate coverage only on Ubuntu 3.11
          pytest tests/ $IGNORE --cov=homepot --cov-report=xml --tb=short --durations=10 \
            -W ignore::UserWarning:homepot \
            -W ignore:".*Database cleanup.*":UserWarning \
            -W ignore:".*Could not cleanup temp database.*":UserWarning
        else
          # Standard execution for other platforms
          pytest tests/ $IGNORE --tb=short --durations=10 \
            -W ignore::UserWarning:homepot \
            -W ignore:".*Database cleanup.*":UserWarning \
            -W ignore:".*Could not cleanup temp database.*":UserWarning
        fi

    - name: Run UQ tests
      shell: bash
      env:
        DATABASE__URL: ${{ matrix.os == 'ubuntu-latest' && format('postgresql+asyncpg://{0}:{1}@localhost:5432/{2}', env.PG_TEST_USER, env.PG_TEST_PASSWORD, env.PG_TEST_DB) || 'sqlite+aiosqlite:///./test.db' }}
      run: |
        cd backend
        if find ../uq/ -name "test_*.py" | grep -q .; then
          echo "Running UQ tests..."
          pytest ../uq/ --tb=short --durations=10
        else
          echo "No UQ tests found, skipping."
        fi

    - name: Upload coverage reports
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: codecov/codecov-action@v4
      with:
        file: ./backend/coverage.xml
        flags: unittests
        name: codecov-umbrella

  test-windows-resilience:
    timeout-minutes: 15
    name: Windows resilience tests
    runs-on: windows-latest
    if: github.repository == 'brunel-opensim/homepot-client'
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      shell: bash
      run: |
        set -e
        python -m pip install --upgrade pip
        pip install -e "backend[dev,test,agent]"

    - name: Run Windows resilience tests
      shell: bash
      run: |
        cd backend
        python -m pytest tests/ -v -m windows_resilience -x
      env:
        HOMEPOT_CI: "1"

  build:
    name: Build Package
    runs-on: ubuntu-latest
    if: github.repository == 'brunel-opensim/homepot-client'
    needs: [code-quality, test]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir build wheel

    - name: Build package
      run: |
        cd backend
        python -m build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python-package
        path: backend/dist/
        retention-days: 30

  docker-build:
    timeout-minutes: 25
    name: Docker Build & Test
    runs-on: ubuntu-latest
    if: github.repository == 'brunel-opensim/homepot-client'
    needs: [build]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and test Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: homepot-client:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        load: true

    - name: Test Docker container with PostgreSQL
      run: |
        set -e
        # Start services with Docker Compose V2
        echo "Starting Docker services (PostgreSQL + HOMEPOT)..."
        docker compose up -d
        
        # Check if containers are running
        echo "Checking container status..."
        docker compose ps
        
        # Wait for PostgreSQL to be ready
        echo "Waiting for PostgreSQL to be ready..."
        timeout=60
        elapsed=0
        until docker compose logs postgres | grep -q "database system is ready to accept connections" || [ $elapsed -ge $timeout ]; do
          echo "Waiting for PostgreSQL... ${elapsed}s elapsed"
          sleep 2
          elapsed=$((elapsed + 2))
        done
        
        if [ $elapsed -ge $timeout ]; then
          echo "PostgreSQL failed to start within ${timeout}s!"
          docker compose logs postgres
          exit 1
        fi
        
        echo "PostgreSQL is ready!"
        docker compose logs postgres
        
        # Wait for HOMEPOT application to be ready
        echo "Waiting for HOMEPOT application to be ready..."
        sleep 20
        echo "Application logs:"
        docker compose logs homepot-client
        
        # Test health endpoint with retries
        echo "Testing health endpoint..."
        for i in {1..10}; do
          if curl -f http://localhost:8000/health; then
            echo "Health check passed!"
            break
          else
            echo "Health check failed, attempt $i/10, waiting 10s..."
            if [ $i -eq 10 ]; then
              echo "All health check attempts failed!"
              echo "Final application logs:"
              docker compose logs homepot-client
              echo "PostgreSQL logs:"
              docker compose logs postgres
              exit 1
            fi
            sleep 10
          fi
        done
        
        # Test root endpoint
        echo "Testing root endpoint..."
        curl -f http://localhost:8000/ || exit 1
        
        # Cleanup
        echo "Stopping services..."
        docker compose down -v

  notify-consortium:
    name: Notify Consortium Partners
    runs-on: ubuntu-latest
    if: always() && github.repository == 'brunel-opensim/homepot-client'
    needs: [docker-build]
    steps:
    - name: Send deployment notification
      run: echo "HOMEPOT Client CI/CD pipeline completed successfully"
      # Future: Add notification logic here (Slack, email, etc.)
